[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E402",   # module-level import not at top — intentional in main.py (post-init imports)
    "E501",   # line too long — not enforced, formatter handles it
]

[tool.ruff.lint.per-file-ignores]
"scripts/*"  = ["E402", "F401"]
"eval/*"     = ["E402", "F401"]
"ingestion/embeddings.py" = ["F401"]   # legacy file kept for backwards compat
