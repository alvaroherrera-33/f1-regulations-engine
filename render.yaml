# Render Blueprint — F1 Regulations RAG Engine Backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: f1-regulations-backend
    runtime: python
    rootDir: backend
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard

      - key: OPENROUTER_API_KEY
        sync: false          # Set manually in Render dashboard

      - key: LLM_MODEL
        value: openai/gpt-oss-120b

      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app,http://localhost:3000

      - key: ADMIN_API_KEY
        sync: false          # Protects /api/upload, /api/admin/*, POST /api/sync/check

      - key: PYTHONUNBUFFERED
        value: "1"
      - key: APP_VERSION
        value: "0.1.0"

      # Memory frugality for the 512MB free tier: pin BLAS/torch to 1 thread
      # so the embedding model loads without OOM-killing the single worker.
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      # Cap glibc malloc arenas (one 64MB arena per CPU otherwise) — key to
      # keeping the model load under the 512MB limit.
      - key: MALLOC_ARENA_MAX
        value: "2"

      - key: HF_HOME
        value: /opt/render/project/.cache/huggingface

  # Daily cron: check FIA website for new regulation PDFs and auto-ingest them
  - type: cron
    name: fia-sync-daily
    runtime: python
    rootDir: backend
    plan: free
    schedule: "0 7 * * *"       # 07:00 UTC every day

    buildCommand: pip install -r requirements.txt

    startCommand: python -m scripts.fia_scraper

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HF_HOME
        value: /opt/render/project/.cache/huggingface
      - key: PYTHONUNBUFFERED
        value: "1"

  # Weekly cron: recompute article_diffs after new data is indexed
  - type: cron
    name: compute-diffs-weekly
    runtime: python
    rootDir: backend
    plan: free
    schedule: "30 7 * * 0"      # 07:30 UTC every Sunday (after fia-sync)

    buildCommand: pip install -r requirements.txt

    startCommand: python -m scripts.compute_diffs

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
