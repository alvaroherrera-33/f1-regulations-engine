name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 min — keeps Render free tier from sleeping
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    name: Ping /warmup
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render backend
        run: |
          echo "Pinging /warmup..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 \
            https://f1-regulations-engine.onrender.com/warmup || echo "timeout")
          echo "Warmup response: $STATUS"
          # Always succeed — if it times out, the ping still woke the service
          echo "Done."
